<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{TITLE}} | WITHJ Blog</title>

<!-- SEO -->
<meta name="description" content="{{DESCRIPTION}}">
<link rel="canonical" href="https://withj-inc.com/blog/{{SLUG}}/">

<!-- OGP -->
<meta property="og:type" content="article">
<meta property="og:title" content="{{TITLE}}">
<meta property="og:description" content="{{DESCRIPTION}}">
<meta property="og:url" content="https://withj-inc.com/blog/{{SLUG}}/">
<meta property="og:image" content="{{OG_IMAGE}}">
<meta property="og:site_name" content="株式会社WITHJ">
<meta property="og:locale" content="ja_JP">
<meta property="article:published_time" content="{{DATE}}">
<meta property="article:author" content="株式会社WITHJ">

<meta name="twitter:card" content="summary_large_image">

<!-- 構造化データ -->
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "BlogPosting",
  "headline": "{{TITLE}}",
  "description": "{{DESCRIPTION}}",
  "image": "{{OG_IMAGE}}",
  "datePublished": "{{DATE}}",
  "author": {
    "@type": "Organization",
    "name": "株式会社WITHJ",
    "url": "https://withj-inc.com/"
  },
  "publisher": {
    "@type": "Organization",
    "name": "株式会社WITHJ",
    "logo": {
      "@type": "ImageObject",
      "url": "https://withj-inc.com/images/熱狂画像.png"
    }
  }
}
</script>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700;800;900&family=Noto+Sans+JP:wght@400;700;900&family=Bebas+Neue&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../style.css">
</head>
<body>

<header class="bl-header">
  <a href="../../" class="bl-logo">WITHJ</a>
  <nav class="bl-nav">
    <a href="../">BLOG</a>
    <a href="../../">TOP</a>
  </nav>
</header>

<article class="bl-article">
  <div class="bl-meta">
    <span class="bl-category">{{CATEGORY}}</span>
    <time datetime="{{DATE}}">{{DATE_DISPLAY}}</time>
  </div>
  <h1 class="bl-title">{{TITLE}}</h1>
  <div class="bl-cover" style="background-image:url('{{OG_IMAGE}}')"></div>

  <div class="bl-body">
    {{BODY}}
  </div>

  <div class="bl-footer-cta">
    <p>関連サービス</p>
    <div class="bl-cta-cards">
      <a href="../../nexus-fc/" class="bl-cta-card">
        <strong>NEXUS FC加盟募集</strong>
        <span>3年で65店舗の急成長ブランド →</span>
      </a>
      <a href="../../nexus-members/" class="bl-cta-card">
        <strong>NEXUS 会員募集</strong>
        <span>完全個室パーソナルジム →</span>
      </a>
    </div>
  </div>

  <a href="../" class="bl-back">← ブログ一覧に戻る</a>
</article>

<footer class="bl-footer">
  <div>WITHJ</div>
  <div>© 2026 株式会社WITHJ All Rights Reserved.</div>
</footer>

</body>
</html>
